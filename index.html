<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Espai privat d'automatitzacions d'ABM Nous Espais">
<meta name="theme-color" content="#111827">
<meta property="og:title" content="Portal ABM Nous Espais">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://cdn.jsdelivr.net; connect-src https://wjpvdigztxbhcmtsqaxz.supabase.co; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; base-uri 'none'; object-src 'none'; form-action 'none'">
<title>ABM Nous Espais · Espai d'automatitzacions</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%23111827'/%3E%3Ctext%20x='32'%20y='45'%20font-family='Arial'%20font-size='34'%20font-weight='800'%20fill='white'%20text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js" integrity="sha384-DjOvX/sJLsmbMrw4wTvf6l3kiGBjdxyOO6X2MTFwOOXGkjN/mE08BoDzrpaaIjil" crossorigin="anonymous"></script>
<style>
:root{
  --ink:#111827; --ink2:#374151; --mut:#6b7280; --line:#e7e9ee; --bg:#f6f7f9; --card:#ffffff;
  --acc:#1f6feb; --acc-d:#1b5fd0; --ok:#16a34a; --warn:#d97706; --info:#2563eb; --done:#0f766e;
  --sh:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);
  --r:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
a{color:var(--acc);text-decoration:none}
svg.ic{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;vertical-align:-5px}
svg.ic.s{width:16px;height:16px;vertical-align:-3px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

/* ---------- Login ---------- */
#login{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;flex-direction:column;gap:18px;
  background:radial-gradient(1200px 600px at 50% -10%, #eef2f7, var(--bg))}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh)}
.login-box{width:100%;max-width:400px;padding:34px 30px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.3px}
.brand .dot{width:32px;height:32px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;flex:none}
.login-box h1{font-size:21px;margin:20px 0 4px;letter-spacing:-.4px}
.login-box p.sub{color:var(--mut);margin:0 0 20px;font-size:13.5px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin:14px 0 6px}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;outline:none;transition:border .15s,box-shadow .15s;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(31,111,235,.12)}
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:46px}
.pwd-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--mut);padding:8px;border-radius:8px}
.pwd-eye:hover{color:var(--ink);background:#f3f4f6}
.btn{background:var(--acc);color:#fff;border:0;padding:12px 16px;border-radius:10px;font-weight:600;font-size:14px;transition:background .15s,transform .05s,opacity .15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{background:var(--acc-d)} .btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn.block{width:100%;margin-top:20px}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:#f3f4f6}
.btn.sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
.err{color:#b91c1c;font-size:13px;margin-top:12px;min-height:16px}
.hint{color:var(--mut);font-size:12.5px;margin-top:14px;text-align:center}
.hint a{cursor:pointer}
.powered{color:#9ca3af;font-size:12px}

/* ---------- App shell ---------- */
#app{min-height:100vh}
header.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-in{max-width:1160px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:14px}
.top .brand{font-size:15px}
.crumb{color:var(--mut);font-size:13.5px;font-weight:600}
.crumb b{color:var(--ink)}
.crumb a{color:var(--mut);cursor:pointer}
.crumb a:hover{color:var(--ink);text-decoration:underline}
.spacer{flex:1}
.who{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);position:relative}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1f6feb,#0ea5e9);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;border:0}
.menu{position:absolute;top:44px;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);min-width:190px;padding:6px;z-index:30}
.menu button{display:flex;align-items:center;gap:9px;width:100%;background:none;border:0;padding:10px 12px;border-radius:8px;font-size:13.5px;color:var(--ink2);text-align:left}
.menu button:hover{background:#f3f4f6;color:var(--ink)}
.wrap{max-width:1160px;margin:0 auto;padding:26px 22px 70px}

/* ---------- Home / mòduls ---------- */
.hello{margin:6px 0 22px}
.hello h1{font-size:26px;letter-spacing:-.6px;margin:0 0 4px}
.hello p{color:var(--mut);margin:0;font-size:14.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.mod{padding:20px;border-radius:var(--r);border:1px solid var(--line);background:var(--card);box-shadow:var(--sh);position:relative;transition:transform .15s,box-shadow .15s}
.mod.on{cursor:pointer}
.mod.on:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(16,24,40,.10)}
.mod .icbox{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:#eef4ff;color:var(--acc);margin-bottom:14px}
.mod h3{margin:0 0 4px;font-size:16px;letter-spacing:-.2px}
.mod p{margin:0;color:var(--mut);font-size:13px;line-height:1.45}
.tag{position:absolute;top:16px;right:16px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px}
.tag.active{background:#e7f6ec;color:#137a3a}
.tag.soon{background:#f1f2f4;color:#6b7280}
.mod.soon{opacity:.72}
.mod.soon .icbox{background:#f3f4f6;color:#9ca3af}
.invite{margin-top:20px;padding:16px 18px;border:1px dashed #cfd6e0;border-radius:var(--r);background:#fbfcfe;color:var(--ink2);font-size:13.5px;display:flex;gap:10px;align-items:flex-start}
.invite b{color:var(--ink)}
.invite .icbox{width:34px;height:34px;border-radius:9px;background:#eef4ff;color:var(--acc);display:grid;place-items:center;flex:none}

/* ---------- Tabs / toolbar / taules ---------- */
.tabs{display:flex;gap:4px;background:#eef0f3;padding:4px;border-radius:12px;width:fit-content;margin:2px 0 20px;max-width:100%;overflow-x:auto}
.tabs button{background:transparent;border:0;padding:8px 15px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--ink2);white-space:nowrap}
.tabs button.sel{background:#fff;color:var(--ink);box-shadow:var(--sh)}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;max-width:300px;flex:1;min-width:190px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut)}
.search-wrap input{padding-left:36px}
.count{color:var(--mut);font-size:13px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink2);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;transition:all .12s}
.chip:hover{border-color:#c7cdd6}
.chip.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.empty{padding:48px 24px;text-align:center;border:1px dashed var(--line);border-radius:var(--r);background:var(--card)}
.empty .icbox{width:52px;height:52px;border-radius:14px;background:#eef4ff;color:var(--acc);display:grid;place-items:center;margin:0 auto 14px}
.empty h3{margin:0 0 6px;font-size:17px}
.empty p{margin:0 auto 16px;color:var(--mut);max-width:440px;font-size:14px;line-height:1.5}
.tbl{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--line);background:var(--card)}
table{width:100%;border-collapse:collapse;min-width:620px}
thead th{text-align:left;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--mut);padding:11px 14px;border-bottom:1px solid var(--line);background:#fbfcfd;white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid #f1f2f4;font-size:13.5px;vertical-align:top}
tbody tr:last-child td{border-bottom:0}
tr.click{cursor:pointer}
tr.click:hover{background:#fafbfc}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
td.cap{color:var(--mut);font-size:12px;font-weight:600;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-base{background:#e7f6ec;color:#137a3a}
.b-ind{background:#fdf1e3;color:#b5670f}
.b-rec{background:#e8f0fe;color:#1a55c9}
.b-val{background:#e3f4f1;color:#0d6a5c}
.b-gray{background:#f1f2f4;color:#6b7280}
.b-just{background:#f3e8ff;color:#7c3aed}
.b-prop{background:#e0e7ff;color:#4338ca}
.dot2{width:7px;height:7px;border-radius:50%;background:currentColor;flex:none}
.pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:#eef0f3;color:#4b5563;white-space:nowrap}
.pill.reforma{background:#eef4ff;color:#1f5fd0}
.footnote{color:var(--mut);font-size:12px;margin-top:10px;line-height:1.5}
.muted{color:var(--mut)}
.ref-price{color:#9ca3af;font-style:italic}

/* ---------- Detall projecte ---------- */
.back{display:inline-flex;align-items:center;gap:5px;color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;background:none;border:0;padding:4px 8px 4px 0;border-radius:8px}
.back:hover{color:var(--ink)}
.dhead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.dhead h2{margin:0;font-size:22px;letter-spacing:-.5px}
.dmeta{color:var(--mut);font-size:13px;margin:4px 0 16px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 16px;box-shadow:var(--sh)}
.stat .v{font-size:17px;font-weight:800;letter-spacing:-.3px}
.stat .k{font-size:11.5px;color:var(--mut);font-weight:600}
td.edit{cursor:pointer;border-bottom:1px dashed transparent}
td.edit:hover{background:#f0f6ff}
td.edit input{padding:5px 8px;font-size:13px;width:90px;border-radius:7px}
.vbtn{background:#fff;border:1px solid var(--line);color:var(--done);font-weight:700;font-size:12px;padding:5px 10px;border-radius:8px;white-space:nowrap}
.vbtn:hover{background:#e3f4f1;border-color:#b3ddd6}
.ai-note{margin-top:14px;padding:12px 16px;border-radius:12px;background:#fbfcfe;border:1px solid var(--line);color:var(--mut);font-size:12.5px;line-height:1.55;display:flex;gap:10px;align-items:flex-start}
.demo-banner{margin-bottom:16px;padding:11px 16px;border-radius:12px;background:#eef4ff;border:1px solid #d3e2fd;color:#1a55c9;font-size:13px;font-weight:600}

/* ---------- Peticions ---------- */
.pet{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px;margin-bottom:14px}
.pet-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.pet-h b{font-size:14.5px}
.pet .meta{color:var(--mut);font-size:12.5px;margin-bottom:10px}
.pet pre{white-space:pre-wrap;font-family:inherit;font-size:13px;color:var(--ink2);background:#fbfcfd;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0;line-height:1.55}
.pet .acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pet select{max-width:280px;padding:8px 10px;font-size:13px}

/* ---------- Modal / overlay ---------- */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.45);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{width:100%;max-width:460px;background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(16,24,40,.25);padding:26px 26px 24px;max-height:92vh;overflow-y:auto}
.modal h3{margin:0 0 4px;font-size:18px;letter-spacing:-.3px}
.modal p.sub{color:var(--mut);font-size:13px;margin:0 0 14px;line-height:1.5}
.modal .row{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.drop{margin-top:8px;border:2px dashed #cfd6e0;border-radius:12px;padding:22px;text-align:center;color:var(--mut);font-size:13px;cursor:pointer;transition:all .15s;background:#fbfcfe}
.drop:hover,.drop.over{border-color:var(--acc);background:#f0f6ff;color:var(--acc)}
.filelist{margin-top:10px;font-size:12.5px;color:var(--ink2)}
.filelist div{display:flex;justify-content:space-between;gap:10px;padding:5px 2px;border-bottom:1px dashed #eef0f3}

/* ---------- Toast / skeleton ---------- */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:12px;box-shadow:0 10px 30px rgba(16,24,40,.3);opacity:0;pointer-events:none;transition:all .25s;z-index:99;max-width:88vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.skel{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:var(--card)}
.skel .row{height:44px;border-bottom:1px solid #f1f2f4;position:relative;overflow:hidden}
.skel .row::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,#f1f4f8,transparent);animation:shim 1.2s infinite}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@media(max-width:640px){.wrap{padding:18px 14px 60px}.hello h1{font-size:22px}.dhead h2{font-size:19px}.top-in{padding:10px 14px}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="card login-box">
    <div class="brand"><span class="dot">A</span> ABM Nous Espais</div>
    <h1>Espai d'automatitzacions</h1>
    <p class="sub">Accedeix amb el teu correu del despatx.</p>
    <label for="email">Correu</label>
    <input id="email" type="email" autocomplete="email" placeholder="el-teu-correu">
    <label for="pass">Contrasenya</label>
    <div class="pwd-wrap">
      <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••">
      <button class="pwd-eye" id="eyeBtn" type="button" aria-label="Mostra la contrasenya"></button>
    </div>
    <button class="btn block" id="loginBtn">Entrar</button>
    <div class="err" id="loginErr" role="alert"></div>
    <div class="hint"><a id="forgot">Has oblidat la contrasenya?</a></div>
  </div>
  <div class="powered">amb tecnologia <b>Pracmatik</b></div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="top">
    <div class="top-in">
      <div class="brand"><span class="dot">A</span> ABM</div>
      <div class="crumb" id="crumb">Inici</div>
      <div class="spacer"></div>
      <div class="who">
        <span id="whoName"></span>
        <button class="avatar" id="whoAv" aria-label="Menú d'usuari">A</button>
        <div class="menu hidden" id="userMenu">
          <button id="chgPwd"></button>
          <button id="logoutBtn"></button>
        </div>
      </div>
    </div>
  </header>
  <div class="wrap">

    <!-- HOME -->
    <section id="home">
      <div class="hello">
        <h1 id="helloH">Hola</h1>
        <p>El vostre espai de treball dels <b>pressupostos</b>.</p>
      </div>
      <div class="grid" id="mods"></div>
    </section>

    <!-- PRESSUPOSTOS -->
    <section id="presu" class="hidden">
      <div class="tabs" id="presuTabs">
        <button data-t="proj" class="sel">Projectes</button>
        <button data-t="pet">Peticions</button>
        <button data-t="preus">Base de preus</button>
        <button data-t="ind">Industrials</button>
      </div>
      <div id="pane-proj"></div>
      <div id="pane-pet" class="hidden"></div>
      <div id="pane-preus" class="hidden"></div>
      <div id="pane-ind" class="hidden"></div>
    </section>

    <!-- DETALL PROJECTE -->
    <section id="detall" class="hidden"></section>

    <!-- ACTIVITAT (només visible per a l'administrador) -->
    <section id="activitat" class="hidden"></section>

  </div>
</div>

<div id="toast" aria-live="polite"></div>

async function login(){
  const btn=$("#loginBtn"); if(btn.disabled) return;

  $("#loginErr").textContent="";
  if(!email||!password){ $("#loginErr").textContent="Escriu el correu i la contrasenya."; return; }
  btn.disabled=true; btn.textContent="Entrant…";
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error){
      const m=(error.message||"").toLowerCase();
      $("#loginErr").textContent =
        (m.includes("fetch")||error.status>=500) ? "No hi ha connexió amb el servidor. Torna-ho a provar." :

    boot(data.user);

}

function openNewProj(){
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h3>Nou pressupost</h3>
    <p class="sub">Puja el projecte executiu i l'estat d'amidaments. L'obra entra a la cua de valoració i t'avisarem quan estigui a punt per revisar.</p>
    <label>Nom de l'obra *</label><input id="pjNom" placeholder="p. ex. Reforma pis c/ Aribau 120">
    <label>Tipus</label><select id="pjTipus"><option value="reforma">Reforma</option><option value="obra_nueva">Obra nova</option></select>
    <label>Adreça</label><input id="pjAdr" placeholder="carrer i municipi (opcional)">
    <label>Plànols i amidaments</label>
    <div class="drop" id="drop">${ic('up')}<br>Arrossega aquí els fitxers<br><span style="font-size:12px">PDF, Excel, imatges… (màx. 100 MB per fitxer)</span></div>
    <input type="file" id="pjFiles" multiple class="hidden">
    <div class="filelist" id="flist"></div>
    <div class="err" id="pjErr"></div>
    <div class="row"><button class="btn ghost" id="pjCancel">Cancel·la</button><button class="btn" id="pjSave">Crea el pressupost</button></div>
  </div>`;
  document.body.appendChild(ov);
  let FILES=[];
  const drop=$("#drop",ov), finput=$("#pjFiles",ov), flist=$("#flist",ov);
  const renderF=()=>{ flist.innerHTML=FILES.map((f,i)=>`<div><span>${esc(f.name)}</span><span class="muted">${(f.size/1048576).toFixed(1)} MB</span></div>`).join(""); };
  drop.addEventListener("click",()=>finput.click());
  finput.addEventListener("change",()=>{FILES=[...FILES,...finput.files]; renderF();});
  ;["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");}));
  ;["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over");}));
  drop.addEventListener("drop",e=>{FILES=[...FILES,...e.dataTransfer.files]; renderF();});
  $("#pjCancel",ov).addEventListener("click",()=>ov.remove());
  $("#pjSave",ov).addEventListener("click", async()=>{
    const nom=$("#pjNom",ov).value.trim(), err=$("#pjErr",ov), btn=$("#pjSave",ov);
    if(!nom){err.textContent="Posa un nom a l'obra.";return;}
    const big=FILES.find(f=>f.size>104857600);
    if(big){err.textContent=`«${big.name}» supera els 100 MB.`;return;}
    btn.disabled=true; err.textContent="";
    btn.textContent="Creant…";
    const {data:proj,error}=await sb.from("proyectos").insert({nombre:nom,tipo:$("#pjTipus",ov).value,direccion:$("#pjAdr",ov).value.trim()||null,estado:"rebut",autor:ME.email}).select().single();
    if(error){ btn.disabled=false; btn.textContent="Crea el pressupost"; err.textContent="No s'ha pogut crear. Torna-ho a provar."; return; }
    const pujats=[];
    for(let i=0;i<FILES.length;i++){
      const f=FILES[i];
      btn.textContent=`Pujant fitxer ${i+1} de ${FILES.length}…`;
      const clean=f.name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w.\-]+/g,"_");
      const {error:e2}=await sb.storage.from("projectes").upload(`${proj.id}/${Date.now()}_${clean}`,f);
      if(e2){ err.textContent=`No s'ha pogut pujar «${f.name}». La resta s'han desat.`; }
      else pujats.push({nom:f.name,mida:f.size});
    }
    if(pujats.length) await sb.from("proyectos").update({archivos:pujats}).eq("id",proj.id);
    ov.remove(); toast("Obra creada ✓ — entra a la cua de valoració");
    loadProjectes();
  });
}

/* Excel real: la funció del núvol omple el document original amb els preus validats */
async function exportExcel(){
  const btn=$("#dlBtn"); if(!btn||btn.dataset.busy) return;
  btn.dataset.busy="1"; const old=btn.innerHTML; btn.innerHTML="Generant l'Excel…";
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(SUPA_URL+"/functions/v1/genera-excel",{method:"POST",
      headers:{Authorization:"Bearer "+session.access_token,apikey:SUPA_ANON,"Content-Type":"application/json"},
      body:JSON.stringify({proyecto_id:CUR.p.id})});
    const j=await r.json();

    const {data,error}=await sb.storage.from("projectes").download(j.path);
    if(error) throw error;
    const a=document.createElement("a"); a.href=URL.createObjectURL(data);
    a.download=j.path.split("/").pop(); a.click(); URL.revokeObjectURL(a.href);
    toast("Pressupost Excel descarregat ✓");
  }catch(e){
    exportCSV(); toast("Excel original no disponible — descarregat CSV provisional.");
  }finally{ delete btn.dataset.busy; btn.innerHTML=old; }
}

function editCell(td){
  if(td.querySelector("input")) return;
  const f=td.dataset.f, id=td.dataset.id, l=CUR.lin.find(x=>x.id===id);
  const cur=f==="margen_pct"?(l.margen_pct??""):(l[f]??"");
  td.dataset.prev=td.innerHTML;
  td.innerHTML=`<input type="number" step="0.01" value="${esc(String(cur))}">`;
  const inp=td.querySelector("input"); inp.focus(); inp.select();
  let closed=false;
  const restore=()=>{ td.innerHTML=td.dataset.prev; bindRow(td); };
  const cancel=()=>{ if(closed)return; closed=true; restore(); };
  const save=async()=>{
    if(closed) return; closed=true;
    const v=inp.value===""?null:Number(inp.value);
    if(v!=null&&(isNaN(v)||v<0)){ restore(); return; }
    const prevPrice=l.precio_unitario;   // per a l'aprenentatge
    const upd={};
    if(f==="margen_pct"){
      if(v==null||l.precio_industrial==null){ restore(); return; }
      upd.margen_pct=v;
      upd.precio_unitario=Math.round(Number(l.precio_industrial)*(1+v/100)*100)/100;
    } else if(f==="precio_industrial"){
      if(v==null){ restore(); return; }
      upd.precio_industrial=v; upd.estado="precio_recibido";   // preu rebut → falta el marge
    } else upd[f]=v;
    const nl={...l,...upd};
    if(nl.medida!=null&&nl.precio_unitario!=null) upd.importe=Math.round(nl.medida*nl.precio_unitario*100)/100;
    const {error}=await sb.from("presupuesto_lineas").update(upd).eq("id",id);
    if(error){ toast("No s'ha pogut desar. Torna-ho a provar."); restore(); return; }
    // aprenentatge: CADA correcció de preu del tècnic (auto/proposta/criteri) = un parell d'entrenament.
    // En 2-3 mesos d'ús acumula prou dades reals per recalibrar/afinar; cada correcció compta.
    if(f==="precio_unitario" && ["proposta","auto","a_justificar"].includes(l.estado) && v!=null && v!==prevPrice){
      sb.from("aprendizaje").insert({proyecto_id:CUR.p.id,
        contexto:`[${l.estado}] ${(l.descripcion||"").slice(0,140)} · IA ${prevPrice??"—"} €/u (conf ${l.confianza??"?"})`,
        correccion:`tècnic ${ME.email} → ${v} €/u`}).then(()=>{});
    }
    if(["precio_unitario","margen_pct","precio_industrial"].includes(f)) l._touched=true;   // marca coneixement humà per a l'aprenentatge
    // decisió humana amb criteri → captura opcional del "per què": sobreescriu un preu de la IA O posa un preu de criteri (gris)
    const decisio = f==="precio_unitario" && v!=null && ((["auto","proposta"].includes(l.estado) && v!==prevPrice) || l.estado==="a_justificar");
    Object.assign(l,upd); toast(f==="precio_industrial"?"Preu rebut desat ✓ — ara posa el marge":"Desat ✓"); renderDetall();
    if(decisio) askMotiu(l);   // captura el CRITERI (el "per què"), opcional i saltable
  };
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter")save(); if(e.key==="Escape")cancel(); });
  inp.addEventListener("blur",save);
}
// Captura del "per què" d'Idoia quan sobreescriu un preu de l'IA (estil formulari de traspàs GTA, però en viu i per partida).
// Opcional i saltable: el motiu viatja pegat al preu après i reapareix a la propera obra semblant.
function askMotiu(l){
  if(document.querySelector(".overlay")) return;   // no acumular modals
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="modal">
    <h3>Per què aquest preu?</h3>
    <p class="sub">Opcional. Si expliques el criteri (per què el de la base no valia, un acabat o mida concreta…), el sistema ho recordarà i ho mostrarà a la propera obra semblant. Així el teu criteri no es perd.</p>
    <textarea id="mtInput" rows="3" style="width:100%;box-sizing:border-box;font:inherit;padding:9px;border:1px solid #d1d5db;border-radius:8px" placeholder="Ex.: la base era acabat estàndard; aquí és gres porcelànic de gran format"></textarea>
    <div class="row"><button class="btn ghost" id="mtSkip">Ara no</button><button class="btn" id="mtSave">Desa el motiu</button></div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  $("#mtSkip",ov).addEventListener("click",close);
  $("#mtSave",ov).addEventListener("click",()=>{
    const v=$("#mtInput",ov).value.trim();
    if(v){ l._motiu=v; toast("Motiu desat ✓ — s'aprendrà amb la partida quan la validis"); }
    close();
  });
  const ta=$("#mtInput",ov); ta.focus();
  ta.addEventListener("keydown",e=>{ if(e.key==="Escape")close(); if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))$("#mtSave",ov).click(); });
}
function bindRow(td){ td.addEventListener("click",()=>editCell(td),{once:true}); }
async function validarLinia(id){
  const l=CUR.lin.find(x=>x.id===id); if(!l) return;
  const prevEstado=l.estado;
  let imp;
  if(l.precio_unitario!=null&&l.medida!=null){ imp=Math.round(l.medida*l.precio_unitario*100)/100; }
  else if(l.estado==="a_justificar"){ imp=lineImport(l)??0; }   // nota / partida sense cost o inclosa en una altra → validar a 0
  else { toast("Falta la quantitat o el preu per validar."); return; }
  const upd={estado:"validado",validado_por:ME.email,validado_at:new Date().toISOString(),importe:imp};
  const {error}=await sb.from("presupuesto_lineas").update(upd).eq("id",id);
  if(error){ toast("No s'ha pogut validar. Torna-ho a provar."); return; }
  Object.assign(l,upd);
  // BUCLE D'APRENENTATGE: si la línia porta coneixement humà (preu tocat pel tècnic o preu d'industrial rebut)
  // i té preu positiu → l'afegim a la base (fn `aprende`) perquè el motor la proposi a la següent obra. Best-effort.
  if((l._touched||prevEstado==="precio_recibido") && l.precio_unitario!=null && Number(l.precio_unitario)>0){
    sb.functions.invoke("aprende",{body:{descripcion:l.descripcion,precio_unitario:l.precio_unitario,
      unidad:l.unidad,tipo:CUR.p.tipo,capitulo:l.capitulo,obra:CUR.p.nombre,motiu:l._motiu||null}}).catch(()=>{});
  }
  if(CUR.lin.every(x=>x.estado==="validado")){
    await sb.from("proyectos").update({estado:"validado"}).eq("id",CUR.p.id);
    CUR.p.estado="validado"; toast("Pressupost validat al complet ✓");
  } else toast("Partida validada ✓");
  renderDetall();
}
function exportCSV(){
  const {p,lin}=CUR;
  const n2=v=>v==null?"":Number(v).toFixed(2).replace(".",",");
  const rows=[["Capítol","Partida","Descripció","Ud","Quantitat","Preu unitari","Import"],
    ...lin.map(l=>[l.capitulo||"",l.partida||"",l.descripcion||"",l.unidad||"",n2(l.medida),n2(l.precio_unitario),n2(lineImport(l))])];
  const tot=lin.reduce((s,l)=>s+(lineImport(l)||0),0);
  rows.push([],["","","","","","TOTAL",n2(tot)]);
  rows.push([],["Preus sense IVA. El tipus aplicable (10% o 21%) depèn del projecte."]);
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download="pressupost_"+(p.nombre||"obra").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w-]+/g,"_").slice(0,60)+".csv";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Pressupost descarregat ✓");
}

let INDS_CACHE=null;
async function loadIndustrials(){
  const el=$("#pane-ind"); el.innerHTML=skel(5);
  if(!INDS_CACHE){
    const {data,error}=await sb.from("industriales").select("nombre,oficio,email,telefono").order("oficio");
    if(error){ errBox(el,"No s'han pogut carregar els industrials",loadIndustrials); return; }
    INDS_CACHE=data||[];
  }
  el.innerHTML=`<div class="toolbar">
    <div class="search-wrap">${ic('search','s')}<input id="indQ" placeholder="Cerca per gremi, nom o correu…" aria-label="Cerca industrials"></div>
    <span class="count" id="indCount"></span></div>
   <div class="tbl"><table><thead><tr><th>Gremi</th><th>Contacte</th><th>Correu</th><th>Telèfon</th></tr></thead><tbody id="indBody"></tbody></table></div>`;
  const draw=()=>{
    const q=$("#indQ").value.toLowerCase();
    const rows=INDS_CACHE.filter(r=>!q||[r.nombre,r.oficio,r.email].some(v=>(v||"").toLowerCase().includes(q)));
    $("#indBody").innerHTML=rows.map(r=>`<tr><td><span class="pill">${esc(r.oficio||"—")}</span></td><td><b>${esc(r.nombre||"—")}</b></td>
     <td>${r.email?`<a href="mailto:${esc(r.email)}">${esc(r.email)}</a>`:"—"}</td>
     <td>${r.telefono?`<a href="tel:${esc(String(r.telefono).replace(/[^\d+]/g,""))}">${ic('phone','s')} ${esc(r.telefono)}</a>`:"—"}</td></tr>`).join("");
    $("#indCount").textContent=rows.length+" contactes";
  };
  $("#indQ").addEventListener("input",draw); draw();
}

/* ================= Activitat (només administrador) =================
   Panell d'auditoria: qui ha entrat i què ha fet cadascú. La fn `admin-actividad` ja verifica
   al servidor que qui truca és ADMIN_EMAIL (encara que algú manipulés la crida, rep 403). */
async function loadActivitat(){
  const el=$("#activitat");
  el.innerHTML=`<h2>Activitat</h2><p class="cap" style="margin-bottom:16px">Qui ha entrat i què ha fet cadascú. Només tu ho veus.</p>`+skel(6);
  const {data:{session}}=await sb.auth.getSession();
  let r=null;
  try{
    const resp=await fetch(SUPA_URL+"/functions/v1/admin-actividad",{headers:{Authorization:"Bearer "+session.access_token,apikey:SUPA_ANON}});
    r=await resp.json();
  }catch(_){ /* r es queda null → errBox */ }
  if(!r||!r.ok){ errBox(el,"No s'ha pogut carregar l'activitat",loadActivitat); return; }
  el.innerHTML=`
    <h2>Activitat</h2><p class="cap" style="margin-bottom:16px">Qui ha entrat i què ha fet cadascú. Només tu ho veus.</p>
    <h3 style="margin:18px 0 8px">Accessos</h3>${renderUsuaris(r.usuaris)}
    <h3 style="margin:22px 0 8px">Obres</h3>${renderObres(r.obres)}
    <h3 style="margin:22px 0 8px">Validacions per persona</h3>${renderValidacions(r.validacions)}
    <h3 style="margin:22px 0 8px">Correccions i aprenentatge recent</h3>${renderAprenentatge(r.aprenentatge)}`;
}
function renderUsuaris(us){
  if(!us||!us.length) return `<p class="muted">Sense dades.</p>`;
  return `<div class="tbl"><table><thead><tr><th>Nom</th><th>Correu</th><th>Últim accés</th></tr></thead><tbody>
    ${us.map(u=>`<tr><td><b>${esc(u.nom||"—")}</b></td><td>${esc(u.email)}</td>
      <td>${u.ultim_acces?esc(fmtDateHora(u.ultim_acces)):'<span class="muted">Encara no ha entrat</span>'}</td></tr>`).join("")}
  </tbody></table></div>`;
}
function renderObres(ob){
  if(!ob||!ob.length) return `<p class="muted">Encara no hi ha cap obra.</p>`;
  return `<div class="tbl"><table><thead><tr><th>Obra</th><th>Creada per</th><th>Data</th><th>Estat</th></tr></thead><tbody>
    ${ob.map(p=>`<tr><td><b>${esc(p.nombre||"—")}</b></td><td>${esc(p.autor||"—")}</td><td>${esc(fmtDate(p.fecha))}</td><td>${badge(EST_PROJ,p.estado)}</td></tr>`).join("")}
  </tbody></table></div>`;
}
function renderValidacions(vs){
  if(!vs||!vs.length) return `<p class="muted">Encara no hi ha partides validades.</p>`;
  return `<div class="tbl"><table><thead><tr><th>Persona</th><th class="num">Partides validades</th><th>Última</th></tr></thead><tbody>
    ${vs.map(v=>`<tr><td>${esc(v.email)}</td><td class="num">${v.partides}</td><td>${esc(fmtDateHora(v.ultima))}</td></tr>`).join("")}
  </tbody></table></div>`;
}
function renderAprenentatge(ap){
  if(!ap||!ap.length) return `<p class="muted">Encara no hi ha correccions registrades.</p>`;
  return ap.map(a=>`<div class="pet"><div class="pet-h"><b>${esc(a.usuario||"—")}</b></div>
    <div class="meta">${esc(fmtDateHora(a.fecha))}</div>
    <p style="margin:0 0 4px;font-size:13.5px">${esc(a.contexto||"")}</p>
    <p style="margin:0;font-size:13.5px;color:var(--ink2)">${esc(a.correccion||"")}</p></div>`).join("");
}
</script>
